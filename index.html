<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHRISTON // SECURE COMMS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-glass: rgba(10, 10, 12, 0.6);
            --border-glass: rgba(255, 255, 255, 0.1);
            --text-main: #f0f0f0;
            --text-muted: #555;
            --accent-red: #ff2a2a;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000;
            font-family: 'Space Mono', monospace;
            color: var(--text-main);
            overflow: hidden;
            cursor: none; 
            -webkit-tap-highlight-color: transparent;
        }

        canvas { position: fixed; top: 0; left: 0; z-index: 1; }

        /* --- CUSTOM CURSOR (Hidden on Mobile) --- */
        .cursor-dot, .cursor-glass {
            position: fixed; top: 0; left: 0;
            border-radius: 50%; pointer-events: none; z-index: 9999;
            transform: translate(-50%, -50%);
        }
        
        .cursor-dot { width: 4px; height: 4px; background: white; }
        .cursor-glass {
            width: 40px; height: 40px;
            border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(4px) invert(10%);
            transition: width 0.3s, height 0.3s, border-color 0.3s;
        }
        .cursor-glass.active {
            width: 60px; height: 60px; border-color: var(--accent-red);
            background: rgba(255, 42, 42, 0.1);
        }

        @media (pointer: coarse) {
            .cursor-dot, .cursor-glass { display: none !important; }
            body, html { cursor: auto; }
        }

        /* --- UI OVERLAY --- */
        .interface {
            position: relative; z-index: 10;
            width: 100%; height: 100vh;
            display: flex; flex-direction: column;
            pointer-events: none;
            box-sizing: border-box;
        }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 2rem 3rem; pointer-events: auto;
            border-bottom: 1px solid var(--border-glass);
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
        }

        .logo { font-family: 'Syncopate', sans-serif; font-weight: 700; letter-spacing: 0.4rem; font-size: 1.5rem; }
        .status-badge { font-size: 0.7rem; color: var(--accent-red); letter-spacing: 2px; }

        /* --- MAIN CONTACT BLOCK --- */
        .contact-container {
            flex-grow: 1; display: flex; flex-direction: column; justify-content: center;
            padding: 0 3rem; max-width: 800px;
        }

        .contact-list {
            display: flex; flex-direction: column; gap: 1rem;
        }

        .contact-item {
            pointer-events: auto;
            display: flex; align-items: center; justify-content: space-between;
            padding: 1.5rem 2rem;
            background: var(--dark-glass);
            border: 1px solid var(--border-glass);
            text-decoration: none; color: white;
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative; overflow: hidden;
        }

        .contact-item::before {
            content: ''; position: absolute; top: 0; left: 0; width: 0%; height: 100%;
            background: white; z-index: -1; transition: width 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .contact-item:hover { transform: translateX(10px); border-color: white; color: black; }
        .contact-item:hover::before { width: 100%; }
        .contact-item:hover .item-label { color: black; }

        .item-title { font-family: 'Syncopate', sans-serif; font-weight: 700; font-size: 1.2rem; letter-spacing: 2px; }
        .item-label { font-size: 0.7rem; color: var(--text-muted); transition: color 0.4s; }

        /* --- SUBTLE LINKS & FOOTER --- */
        .system-logs {
            padding: 2rem 3rem; display: flex; justify-content: space-between; align-items: flex-end;
            font-size: 0.7rem; color: var(--text-muted); pointer-events: auto;
        }

        .readouts p { margin: 0.3rem 0; letter-spacing: 1px; }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 768px) {
            nav { padding: 1.5rem; flex-direction: column; gap: 1rem; text-align: center; }
            .contact-container { padding: 2rem 1.5rem; }
            .contact-item { padding: 1rem 1.2rem; flex-direction: column; align-items: flex-start; gap: 0.5rem; }
            .system-logs { padding: 1.5rem; flex-direction: column; gap: 2rem; align-items: flex-start; }
        }

        .scramble { pointer-events: auto; cursor: pointer; }
    </style>
</head>
<body>

    <div class="cursor-dot" id="cursor-dot"></div>
    <div class="cursor-glass" id="cursor-glass"></div>

    <canvas id="shader-canvas"></canvas>

    <div class="interface">

                <a href="https://instagram.com/christonwords" target="_blank" class="contact-item">

        <div class="system-logs">

    </div>

    <script id="vertexShader" type="x-shader/x-vertex">
        varying vec2 vUv;
        void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        uniform float iTime; uniform vec2 iResolution; uniform vec2 iMouse;
        
        vec2 hash( vec2 p ) {
            p = vec2( dot(p,vec2(127.1,311.7)), dot(p,vec2(269.5,183.3)) );
            return -1.0 + 2.0*fract(sin(p)*43758.5453123);
        }

        float noise( in vec2 p ) {
            const float K1 = 0.366025404; const float K2 = 0.211324865;
            vec2 i = floor( p + (p.x+p.y)*K1 ); vec2 a = p - i + (i.x+i.y)*K2;
            vec2 o = (a.x>a.y) ? vec2(1.0,0.0) : vec2(0.0,1.0);
            vec2 b = a - o + K2; vec2 c = a - 1.0 + 2.0*K2;
            vec3 h = max( 0.5-vec3(dot(a,a), dot(b,b), dot(c,c) ), 0.0 );
            vec3 n = h*h*h*h*vec3( dot(a,hash(i+0.0)), dot(b,hash(i+o)), dot(c,hash(i+1.0)));
            return dot( n, vec3(70.0) );
        }

        float fbm(vec2 uv) {
            float f = 0.0; mat2 m = mat2( 1.6,  1.2, -1.2,  1.6 );
            f  = 0.5000*noise( uv ); uv = m*uv; f += 0.2500*noise( uv ); uv = m*uv;
            f += 0.1250*noise( uv ); uv = m*uv; f += 0.0625*noise( uv ); uv = m*uv;
            return f;
        }

        void main() {
            vec2 uv = gl_FragCoord.xy / iResolution.xy;
            vec2 p = -1.0 + 2.0 * uv; p.x *= iResolution.x / iResolution.y;
            
            vec2 mouse = iMouse / iResolution;
            vec2 m = -1.0 + 2.0 * mouse; m.x *= iResolution.x / iResolution.y;

            float dist = length(p - m); float interaction = exp(-dist * 3.0) * 0.5;

            vec2 q = vec2(0.); q.x = fbm( p + 0.00 * iTime); q.y = fbm( p + vec2(1.0));
            vec2 r = vec2(0.); r.x = fbm( p + 1.0 * q + vec2(1.7,9.2) + 0.15 * iTime + interaction);
            r.y = fbm( p + 1.0 * q + vec2(8.3,2.8) + 0.126 * iTime - interaction);

            float f = fbm(p + r);

            vec3 color = mix(vec3(0.01, 0.01, 0.02), vec3(0.05, 0.05, 0.08), clamp((f*f)*4.0, 0.0, 1.0));
            float spec = pow(f, 4.0) * 2.0; color += vec3(0.4, 0.45, 0.5) * spec;
            
            float edge = fwidth(f);
            color.r += smoothstep(0.4, 0.5, f) * 0.1 * sin(iTime + p.x * 10.0);
            color.b += smoothstep(0.4, 0.5, f - edge) * 0.1 * cos(iTime + p.y * 10.0);

            float vig = 1.0 - smoothstep(0.5, 1.5, length(p)); color *= vig;
            gl_FragColor = vec4(color, 1.0);
        }
    </script>

    <script>
        // --- THREE.JS SCENE SETUP ---
        let scene, camera, renderer, bgMaterial, coreMesh;
        let mouse = new THREE.Vector2(window.innerWidth/2, window.innerHeight/2);
        let targetMouse = new THREE.Vector2(window.innerWidth/2, window.innerHeight/2);
        let rawMouse = { x: 0, y: 0 };

        function initScene() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.z = 2.5;

            const bgGeometry = new THREE.PlaneGeometry(20, 20);
            bgMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    iTime: { value: 0 },
                    iResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                    iMouse: { value: new THREE.Vector2(window.innerWidth/2, window.innerHeight/2) }
                },
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                depthWrite: false
            });
            const bgMesh = new THREE.Mesh(bgGeometry, bgMaterial);
            bgMesh.position.z = -5; scene.add(bgMesh);

            const coreGeometry = new THREE.IcosahedronGeometry(0.8, 1);
            const coreMaterial = new THREE.MeshBasicMaterial({ color: 0xff2a2a, wireframe: true, transparent: true, opacity: 0.3 });
            coreMesh = new THREE.Mesh(coreGeometry, coreMaterial); scene.add(coreMesh);

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('shader-canvas'), antialias: true });
            // Cap pixel ratio for mobile performance
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            onWindowResize();

            window.addEventListener('resize', onWindowResize);
            
            // Mouse Events
            window.addEventListener('mousemove', (e) => updateMouse(e.clientX, e.clientY));
            
            // Touch Events for Mobile
            window.addEventListener('touchmove', (e) => {
                if(e.touches.length > 0) {
                    updateMouse(e.touches[0].clientX, e.touches[0].clientY);
                }
            }, { passive: true });

            animateScene();
        }

        function updateMouse(clientX, clientY) {
            targetMouse.x = clientX;
            targetMouse.y = window.innerHeight - clientY;
            rawMouse.x = (clientX / window.innerWidth) * 2 - 1;
            rawMouse.y = -(clientY / window.innerHeight) * 2 + 1;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            bgMaterial.uniforms.iResolution.value.set(window.innerWidth, window.innerHeight);
        }

        function animateScene(time) {
            requestAnimationFrame(animateScene);
            bgMaterial.uniforms.iTime.value = time * 0.001;
            mouse.lerp(targetMouse, 0.03); 
            bgMaterial.uniforms.iMouse.value.copy(mouse);

            if (coreMesh) {
                coreMesh.rotation.x += 0.002; coreMesh.rotation.y += 0.003;
                coreMesh.position.x += (rawMouse.x * 0.5 - coreMesh.position.x) * 0.05;
                coreMesh.position.y += (rawMouse.y * 0.5 - coreMesh.position.y) * 0.05;
            }
            renderer.render(scene, camera);
        }

        initScene();

        // --- INTERACTIVE UI SCRIPTING ---
        const dot = document.getElementById('cursor-dot');
        const glass = document.getElementById('cursor-glass');
        let cursorX = window.innerWidth / 2, cursorY = window.innerHeight / 2;
        let glassX = cursorX, glassY = cursorY;

        // Only run custom cursor logic if it's not a touch device
        if (window.matchMedia("(pointer: fine)").matches) {
            window.addEventListener('mousemove', (e) => {
                cursorX = e.clientX; cursorY = e.clientY;
                dot.style.transform = `translate(${cursorX}px, ${cursorY}px)`;
            });

            function animateCursor() {
                glassX += (cursorX - glassX) * 0.15; glassY += (cursorY - glassY) * 0.15;
                glass.style.transform = `translate(${glassX}px, ${glassY}px)`;
                requestAnimationFrame(animateCursor);
            }
            animateCursor();

            document.querySelectorAll('a, .scramble').forEach(el => {
                el.addEventListener('mouseenter', () => glass.classList.add('active'));
                el.addEventListener('mouseleave', () => glass.classList.remove('active'));
            });
        }

        // Cyberpunk Text Scramble Effect
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*";
        document.querySelectorAll('.scramble').forEach(el => {
            el.addEventListener('mouseenter', event => {
                let iterations = 0; const originalText = event.target.dataset.value;
                clearInterval(el.interval);
                el.interval = setInterval(() => {
                    event.target.innerText = originalText.split("")
                        .map((letter, index) => {
                            if(index < iterations) return originalText[index];
                            return letters[Math.floor(Math.random() * letters.length)];
                        }).join("");
                    if(iterations >= originalText.length) clearInterval(el.interval);
                    iterations += 1 / 3;
                }, 30);
            });
        });
    </script>
</body>
